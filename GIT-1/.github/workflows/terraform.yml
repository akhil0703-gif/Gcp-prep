name: 'Terraform Plan'
on:
  push:
    branches: [ "main" ]

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./azurebatch/project

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: terraform plan
     
    - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      # Optional: Add Apply if you want it to deploy automatically 
      # (usually you'd want manual approval or branch protection for this in a real environment)
      # - name: Terraform Apply
        # run: terraform apply -auto-approve tfplan
